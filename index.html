<!DOCTYPE html>
<html>
<head>
    <title>My Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 10px;
            display: inline-block;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>📊 My First Dashboard</h1>

    <div class="card">
        <h2>Total Sales</h2>
        <p>₹ 25,000</p>
    </div>

    <div class="card">
        <h2>Orders</h2>
        <p>120</p>
    </div>

    <canvas id="myChart"></canvas>

    <script>
        const ctx = document.getElementById('myChart');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Jan', 'Feb', 'Mar'],
                datasets: [{
                    label: 'Sales',
                    data: [5000, 8000, 12000]
                }]
            }
        });
    </script>

</body>
</html>
